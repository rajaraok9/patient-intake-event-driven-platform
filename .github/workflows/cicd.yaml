name: Build and Push Microservices

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY_PATIENT: patient-intake-service
  ECR_REPOSITORY_WORKFLOW: workflow-worker
  # Providing this prevents Spring from failing property resolution
  # and allows us to use the same application.yaml for local and cloud deployments.
  AWS_ACCOUNT_ID: 785640717631

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build All Modules (Reactor Build)
        # This is the "Project-Based" way. We build from the root
        # so the children can see the Parent POM and AWS BOM.
        run: mvn -U clean install -DskipTests -am
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Patient Intake Image
        run: |
          # The context is the child folder where the Dockerfile and Target live
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PATIENT }}:latest ./patient-intake-service
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PATIENT }}:latest

      - name: Build and Push Workflow Worker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKFLOW }}:latest ./workflow-worker
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKFLOW }}:latest
          
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name healthcare-cluster

      - name: Deploy services to EKS
        run: |
          kubectl apply -f k8s/patient-intake-service.yaml
          kubectl apply -f k8s/keda-auth.yaml 
          kubectl apply -f k8s/patient-intake-deployment.yaml
          kubectl apply -f k8s/keda-scaledobject.yaml
          kubectl apply -f k8s/workflow-worker-deployment.yaml
