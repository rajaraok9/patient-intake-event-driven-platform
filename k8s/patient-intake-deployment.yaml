apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-intake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-intake
  template:
    metadata:
      labels:
        app: patient-intake
    spec:
      containers:
        - name: patient-intake
          image: 785640717631.dkr.ecr.ap-south-1.amazonaws.com/patient-intake-service:latest
          ports:
            - containerPort: 8888
          env:
                # These variable names are standard for the AWS SDK
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-sqs-credentials
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-sqs-credentials
                      key: secret-key
                - name: AWS_REGION
                  value: "ap-south-1"